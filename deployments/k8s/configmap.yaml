# Non-secret configuration for the gateway server.
# See cmd/server/main.go and internal/model/config.go for which env vars
# the process reads. MODEL_API_KEY is deliberately absent here — it lives
# in secret.yaml instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: server-config
  namespace: lead-mind-ai-agent
data:
  SERVER_ADDR: ":8080"
  # OpenAI-compatible endpoint for the primary model provider (PROJECT.md
  # §1.3: domestic model primary, e.g. Doubao/Ark or Qwen/DashScope
  # compatible-mode URL). Overseas fallback chain is not wired up yet
  # (see PROJECT.md §5 阶段三).
  MODEL_BASE_URL: "https://CHANGE-ME.example.com/v1"
  MODEL_NAME: "CHANGE-ME"
