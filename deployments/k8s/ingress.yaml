# Optional — only apply this if the cluster's ingress controller is
# nginx-ingress and you want to expose the gateway externally. Adjust
# host/tls/ingressClassName for your cluster; other controllers need
# their own equivalent of the buffering-disable annotation.
#
# nginx-ingress buffers upstream responses by default, which breaks the
# SSE endpoint (GET /v1/chat/stream never flushes to the client until the
# whole response is buffered or the connection times out). The
# annotations below disable buffering and extend the read timeout past
# nginx's default so long-running agent streams aren't cut off.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: server
  namespace: lead-mind-ai-agent
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: CHANGE-ME.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  name: http
