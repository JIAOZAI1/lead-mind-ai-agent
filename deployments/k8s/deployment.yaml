# Stateless gateway server (PROJECT.md §8.1: server is stateless, scales
# horizontally; session state / long tasks are out of scope for this
# manifest until internal/memory and cmd/worker exist).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  labels:
    app: lead-mind-ai-agent
    component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lead-mind-ai-agent
      component: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: lead-mind-ai-agent
        component: server
    spec:
      # ghcr.io packages default to private; remove if the package is
      # made public, or point at a different pull secret name.
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: server
          # CHANGE-ME: pin to a real tag (e.g. a semver release or
          # sha-<short-sha> from CI) before applying — `latest` here is a
          # placeholder only.
          image: ghcr.io/jiaozai1/lead-mind-ai-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: server-config
            - secretRef:
                name: server-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      # Graceful shutdown: cmd/server/main.go handles SIGTERM and drains
      # within 10s (see PROJECT.md §8.1); give it a little headroom.
      terminationGracePeriodSeconds: 15
